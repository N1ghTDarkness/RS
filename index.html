<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Zkouškový simulátor - Rádiové sítě</title>
    <style>
        :root {
            --primary: #c8102e; /* VŠB-TUO Red */
            --primary-dark: #a00d25;
            --secondary: #333f48;
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --green: #27ae60;
            --orange: #f39c12;
            --red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigace */
        #sidebar {
            width: 320px;
            background: var(--card-bg);
            border-right: 1px solid #d1d9e0;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subject {
            font-size: 0.9rem;
            color: var(--secondary);
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .nav-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .nav-item:hover { background: #eef2f7; border-color: var(--primary); }
        .nav-item.active { border: 2px solid var(--primary); background: #fff1f3; color: var(--primary); }
        .nav-item.status-green { background: var(--green) !important; color: white; border: none; }
        .nav-item.status-orange { background: var(--orange) !important; color: white; border: none; }
        .nav-item.status-red { background: var(--red) !important; color: white; border: none; }
        .nav-item.flagged { box-shadow: inset 0 0 0 3px #007bff; }

        /* Hlavní obsah */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .question-card {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-top: 0; font-size: 1.3rem; line-height: 1.5; color: #1a1a1a; }

        .options-list { list-style: none; padding: 0; margin: 25px 0; }

        .option-item {
            padding: 15px 20px;
            border: 1px solid #e0e6ed;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .option-item:hover { background: #f0f4f8; border-color: #cbd5e0; }
        .option-item input { margin-right: 15px; transform: scale(1.2); }
        
        /* Feedback a barvy po vyhodnocení */
        .option-item.correct { background: #e6f4ea; border-color: #57bb71; color: #1e4620; }
        .option-item.wrong { background: #fce8e6; border-color: #d93025; color: #a50e0e; }

        .btn-check {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-check:hover { background: var(--primary-dark); }
        .btn-check:disabled { background: #bdc3c7; cursor: not-allowed; }

        .rationale-box {
            margin-top: 25px;
            padding: 20px;
            background: #fdfaf0;
            border-left: 4px solid #f1c40f;
            border-radius: 4px;
            display: none;
            font-size: 0.95rem;
        }

        .rationale-box b { color: #856404; display: block; margin-bottom: 5px; }

        .controls {
            max-width: 800px;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .btn-nav {
            background: #fff;
            border: 1px solid #d1d9e0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-nav:hover { background: #f8f9fa; }

        .hint {
            color: var(--primary);
            font-size: 0.85rem;
            cursor: help;
            text-decoration: underline;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">Rádiové sítě</div>
    <div class="subject">Zkušební simulátor (Okruhy 09-11)</div>
    
    <div class="stats">
        <div>Vyřešeno: <span id="stat-solved">0</span> / 80</div>
        <div style="margin-top:5px;">Úspěšnost: <span id="stat-percent">0</span>%</div>
    </div>

    <div class="nav-grid" id="nav-grid">
        <!-- Generováno JS -->
    </div>
    
    <div style="margin-top: auto; padding-top: 20px;">
        <button class="btn-nav" style="width:100%" onclick="resetTest()">Restartovat test</button>
    </div>
</div>

<main>
    <div id="quiz-container"></div>
    <div class="controls">
        <button class="btn-nav" onclick="prevQ()">← Předchozí</button>
        <button class="btn-nav" id="btn-flag" onclick="toggleFlag()">Oznakovat otázku</button>
        <button class="btn-nav" onclick="nextQ()">Následující →</button>
    </div>
</main>

<script>
// Data questions (Sloučení Okruhů 09, 10 a 11)
const master = [
    // OKRUH 09 (1-20)
    { id: 1, q: "Kdy bylo v Československu zahájeno pravidelné rozhlasové vysílání stanicí Radiojournal?", opts: ["1910", "1922", "18. 5. 1923", "1959"], ans: [2], pts: 1, hint: "Stalo se tak v Praze - Kbelích.", rationale: "Pravidelné vysílání v ČSR začalo 18. května 1923 ze stanu v pražských Kbelích." },
    { id: 2, q: "Která organizace sdružuje provozovatele pro digitalizaci rozhlasu (standard DAB)?", opts: ["Eureka 147", "CCIR", "OIRT", "DVB Konsorcium"], ans: [0], pts: 1, hint: "Evropský projekt z 80. let.", rationale: "Projekt Eureka 147 je technologickým základem digitalizace rozhlasových pásem (DAB)." },
    { id: 3, q: "Který systém je určen pro digitální vysílání na kmitočtech pod 30 MHz (DV, SV, KV)?", opts: ["DAB", "DRM (Digital Radio Mondiale)", "DMB", "FM"], ans: [1], pts: 1, hint: "V názvu má 'světový' rozhlas.", rationale: "DRM je standard pro digitální rozhlas v pásmech dlouhých, středních a krátkých vln." },
    { id: 4, q: "Experimentální vysílání DRM v Českých Budějovicích (2022) využilo kanál o šířce:", opts: ["200 kHz", "1,5 MHz", "9 kHz", "14 MHz"], ans: [2], pts: 1, hint: "Stejná jako analogové AM v Evropě.", rationale: "V pásmu SV se využívá standardní rastr 9 kHz." },
    { id: 5, q: "V kontextu DAB znamená multiplex (MUX):", opts: ["Anténní zesilovač", "Sdružení více stanic do jednoho datového toku na jedné frekvenci", "Půlhodinový záznam", "Dopravní vysílání"], ans: [1], pts: 1, hint: "Umožňuje přenos 6 a více stanic najednou.", rationale: "Multiplex sdružuje digitální data několika stanic do jednoho celku." },
    { id: 6, q: "Jaká je výhoda DAB+ oproti FM z hlediska výkonu vysílačů?", opts: ["Vyžaduje vyšší výkon", "Stačí menší vyzářený výkon pro stejné pokrytí", "Nesmí se vysílat v noci", "Výkon je nulový"], ans: [1], pts: 1, hint: "Omezuje elektromagnetický smog.", rationale: "Digitální systémy jsou energeticky efektivnější a umožňují kvalitní příjem s nižším výkonem." },
    { id: 7, q: "Standard DAB+ využívá pro zvuk modernější kódování:", opts: ["MP2", "MP3", "HE-AAC v2", "FLAC"], ans: [2], pts: 1, hint: "Je efektivnější než původní DAB (MP2).", rationale: "DAB+ využívá AAC (Advanced Audio Coding), což umožňuje vyšší kvalitu při nižším datovém toku." },
    { id: 8, q: "Co je to systém DMB (Digital Multimedia Broadcasting)?", opts: ["Náhrada za papírové noviny", "Rozšíření DAB pro přenos videa a TV v mobilních zařízeních", "Satelitní rádio", "Příjem přes internet"], ans: [1], pts: 1, hint: "Vychází z Eureka 147.", rationale: "DMB umožňuje sledovat mobilní TV v rámci digitálního rozhlasového multiplexu." },
    { id: 9, q: "Pásmo VKV II (CCIR) v ČR je v rozsahu:", opts: ["66-73 MHz", "174-240 MHz", "87,5-108 MHz", "470-790 MHz"], ans: [2], pts: 1, hint: "Standardní FM pásmo.", rationale: "VKV CCIR v rozsahu 87,5-108 MHz je aktuální pásmo pro analogové FM vysílání." },
    { id: 10, q: "Výhoda DAB v členitém terénu spočívá v:", opts: ["Nemožnosti odrazů", "Využití odrazů pro posílení signálu (odolnost vůči interferencím)", "Signál terénem neprojde", "Vždy vyžaduje přímou viditelnost"], ans: [1], pts: 1, hint: "Využívá OFDM.", rationale: "Díky OFDM a ochrannému intervalu DAB dobře zvládá šíření signálu s mnoha odrazy." },
    
    // OKRUH 10 (21-40)
    { id: 11, q: "Jaký kompresní standard pro video využívá síť DVB-T2 v ČR?", opts: ["MPEG-2", "H.264", "HEVC (H.265)", "AV1"], ans: [2], pts: 1, hint: "Moderní formát s vysokou účinností.", rationale: "DVB-T2 v ČR používá kompresi HEVC, která umožňuje vysílat více HD programů v jednom multiplexu." },
    { id: 12, q: "Pojem SFN (Single Frequency Network) znamená:", opts: ["Více programů v jednom kanálu", "Jednokmitočtová síť - více vysílačů na stejném kanálu", "Zákaz používání FM", "Vysílání pouze v noci"], ans: [1], pts: 1, hint: "Šetří frekvenční spektrum.", rationale: "SFN umožňuje pokrýt rozsáhlé území stejným obsahem na jedné jediné frekvenci." },
    { id: 13, q: "Jak se nazývá jev, kdy digitální obraz při slabém signálu zcela zmizí?", opts: ["Snowing", "Shadowing", "Cliff effect (digitální útes)", "Aliasing"], ans: [2], pts: 1, hint: "Náhlý pád kvality.", rationale: "U digitálního signálu buď obraz je bezchybný, nebo při poklesu pod mez bitové chybovosti zmizí." },
    { id: 14, q: "Jaká je role LNB konvertoru u satelitní paraboly?", opts: ["Otáčení motorem", "Převedení vysokých kmitočtů (Ku pásmo) na nižší (mezifrekvenci)", "Zobrazení teletextu", "Napájení televize ze slunce"], ans: [1], pts: 1, hint: "Low Noise Block.", rationale: "LNB konvertuje signál z cca 10-12 GHz na kmitočty cca 1-2 GHz pro přenos kabelem." },
    { id: 15, q: "Parametr 'Azimut' při instalaci paraboly určuje:", opts: ["Svislý sklon", "Vodorovné natočení (směr ke světové straně)", "Natočení LNB v držáku", "Velikost talíře"], ans: [1], pts: 1, hint: "Úhel v horizontální rovině.", rationale: "Azimut určuje, kam parabola 'kouká' na kompasu (např. 19.2° východně)." },
    { id: 16, q: "DVB-S2 přineslo oproti DVB-S nové kódování pro opravu chyb:", opts: ["Reed-Solomon", "LDPC + BCH", "Turbo kódy", "Pouze paritu"], ans: [1], pts: 1, hint: "Blíží se Shannonovu limitu.", rationale: "LDPC kódování je mnohem efektivnější a umožňuje vyšší datovou propustnost." },
    { id: 17, q: "Co je to 'Ochranný interval' v systémech DVB-T/T2?", opts: ["Doba pauzy mezi pořady", "Časová prodleva pro eliminaci ISI (mezisymbolových interferencí)", "Kód pro rodičovský zámek", "Frekvenční mezera mezi kanály"], ans: [1], pts: 1, hint: "Souvisí s odrazy signálu.", rationale: "Ochranný interval brání tomu, aby odražené signály znehodnotily následující symboly." },
    { id: 18, q: "D-Book je v ČR:", opts: ["Historie TV", "Technická specifikace pro přijímače v ČR", "Seznam satelitů", "Ceník televizí"], ans: [1], pts: 1, hint: "Uvádí požadavky na kodeky a EPG.", rationale: "D-Book definuje technické standardy, které musí splňovat přijímač pro český trh." },
    { id: 19, q: "Vysílací mód 32k u DVB-T2 umožňuje:", opts: ["32 000 barev", "Využití 32 768 nosných vln", "Přenos 32 programů", "Maximální výkon 32 kW"], ans: [1], pts: 1, hint: "Počet subnosných OFDM.", rationale: "Větší počet nosných umožňuje delší ochranný interval při zachování kapacity." },
    { id: 20, q: "Satelitní družice GEO se nacházejí ve výšce cca:", opts: ["500 km", "10 000 km", "36 000 km", "100 000 km"], ans: [2], pts: 1, hint: "Geostacionární dráha.", rationale: "Ve výšce cca 35 786 km je doba oběhu družice shodná s rotací Země." },

    // OKRUH 11 (41-60)
    { id: 21, q: "Z kolika hlavních segmentů se skládá systém GPS?", opts: ["1", "2", "3 (kosmický, řídící, uživatelský)", "4"], ans: [2], pts: 1, hint: "Družice, pozemní stanice a lidé.", rationale: "GPS tvoří kosmický (satelity), řídící (pozemní stanice) a uživatelský segment." },
    { id: 22, q: "Kolik družic GPS je standardně aktivních v kosmickém segmentu?", opts: ["3", "12", "Minimálně 24", "100"], ans: [2], pts: 1, hint: "Zajišťují viditelnost kdekoli na Zemi.", rationale: "Základní konstelace GPS tvoří 24 družic na 6 oběžných drahách." },
    { id: 23, q: "Kolik družic musí přijímač vidět pro určení 3D polohy a času (4 neznámé)?", opts: ["1", "2", "3", "4"], ans: [3], pts: 1, hint: "X, Y, Z a časová odchylka.", rationale: "Čtvrtá družice je nutná k synchronizaci levných hodin v přijímači s atomovými hodinami na družicích." },
    { id: 24, q: "Systém EGNOS slouží k:", opts: ["Sledování filmů", "Zpřesnění navigace GPS v Evropě pomocí geostacionárních družic", "Vojenskému šifrování", "Předpovědi počasí"], ans: [1], pts: 1, hint: "Evropský korekční systém.", rationale: "EGNOS vysílá korekční data, která snižují chybu GPS z cca 15-20 m na cca 1-2 m." },
    { id: 25, q: "Ruský globální navigační systém se jmenuje:", opts: ["Galileo", "Beidou", "GLONASS", "Starlink"], ans: [2], pts: 1, hint: "Sputnikovaja sistěma.", rationale: "GLONASS je ruská verze globální satelitní navigace." },
    { id: 26, q: "Která dráha (orbita) má nejmenší zpoždění signálu (latenci)?", opts: ["GEO (36 000 km)", "MEO (20 000 km)", "LEO (500-2000 km)", "HEO"], ans: [2], pts: 1, hint: "Je nejblíže k zemskému povrchu.", rationale: "Družice LEO (Low Earth Orbit) umožňují latenci pod 30 ms." },
    { id: 27, q: "Navigační zpráva GPS se vysílá rychlostí:", opts: ["50 bit/s", "10 Mbit/s", "1 Gbit/s", "8 kHz"], ans: [0], pts: 1, hint: "Velmi pomalý přenos dat.", rationale: "Zpráva obsahující efemeridy a almanach je vysílána velmi pomalou rychlostí 50 baudů." },
    { id: 28, q: "Efemeridy v systému GPS obsahují:", opts: ["Historii vesmíru", "Přesná data o dráze konkrétní družice", "Přibližná data o všech družicích", "Katalog hvězd"], ans: [1], pts: 1, hint: "Jsou platné jen cca 1-4 hodiny.", rationale: "Efemeridy jsou vysoce přesné údaje o poloze vysílající družice." },
    { id: 29, q: "Frekvence L1 systému GPS je:", opts: ["100 MHz", "1575,42 MHz", "2400 MHz", "10 GHz"], ans: [1], pts: 1, hint: "Pásmo L.", rationale: "Civilní kód C/A je vysílán na nosné L1 (1575,42 MHz)." },
    { id: 30, q: "Co znamená pojem Apogeum?", opts: ["Bod dráhy nejblíže k Zemi", "Bod dráhy nejdále od Země", "Úhel dopadu signálu", "Střed Slunce"], ans: [1], pts: 1, hint: "Opak perigea.", rationale: "Apogeum je nejvzdálenější bod eliptické dráhy." }
];

let currentIdx = 0;
let results = new Array(master.length).fill(null);
let flags = new Array(master.length).fill(false);
let solvedCount = 0;

function init() {
    const grid = document.getElementById('nav-grid');
    master.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'nav-item';
        div.id = `nav-${i}`;
        div.innerText = i + 1;
        div.onclick = () => goTo(i);
        grid.appendChild(div);
    });
    showQuestion(0);
    updateStats();
}

function showQuestion(idx) {
    currentIdx = idx;
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    
    const qData = master[idx];
    const card = document.createElement('div');
    card.className = 'question-card';
    card.style.display = 'block';
    
    card.innerHTML = `
        <div style="color:#7f8c8d; margin-bottom:10px;">Otázka ${idx + 1} z ${master.length}</div>
        <h2>${qData.q}</h2>
        <span class="hint" onclick="alert('Nápověda: ' + '${qData.hint}')">Nápověda</span>
        <div class="options-list" id="opts-${idx}">
            ${qData.opts.map((o, i) => `
                <label class="option-item" id="opt-label-${idx}-${i}">
                    <input type="radio" name="q${idx}" value="${i}" ${results[idx] !== null ? 'disabled' : ''} 
                        ${results[idx] !== null && results[idx].selected == i ? 'checked' : ''}>
                    ${o}
                </label>
            `).join('')}
        </div>
        <button class="btn-check" id="btn-check-${idx}" onclick="checkAnswer(${idx})" ${results[idx] !== null ? 'disabled' : ''}>Vyhodnotit</button>
        <div class="rationale-box" id="rat-${idx}">
            <b>Odůvodnění:</b>
            ${qData.rationale}
        </div>
    `;
    
    container.appendChild(card);
    
    // Highlight active nav
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`nav-${idx}`).classList.add('active');
    
    if (results[idx] !== null) {
        revealResults(idx);
    }
    updateFlagBtn();
}

function checkAnswer(idx) {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    if (!selected) return alert("Vyberte prosím odpověď.");
    
    const val = parseInt(selected.value);
    const isCorrect = master[idx].ans.includes(val);
    
    results[idx] = { selected: val, correct: isCorrect };
    solvedCount++;
    
    revealResults(idx);
    updateNavStatus(idx);
    updateStats();
}

function revealResults(idx) {
    const qData = master[idx];
    const result = results[idx];
    
    qData.opts.forEach((o, i) => {
        const label = document.getElementById(`opt-label-${idx}-${i}`);
        if (qData.ans.includes(i)) {
            label.classList.add('correct');
        } else if (result.selected === i && !qData.ans.includes(i)) {
            label.classList.add('wrong');
        }
    });
    
    document.getElementById(`rat-${idx}`).style.display = 'block';
    document.getElementById(`btn-check-${idx}`).disabled = true;
    document.querySelectorAll(`input[name="q${idx}"]`).forEach(inp => inp.disabled = true);
}

function updateNavStatus(idx) {
    const nav = document.getElementById(`nav-${idx}`);
    if (results[idx].correct) nav.classList.add('status-green');
    else nav.classList.add('status-red');
}

function updateStats() {
    document.getElementById('stat-solved').innerText = solvedCount;
    const correct = results.filter(r => r && r.correct).length;
    const percent = solvedCount > 0 ? Math.round((correct / solvedCount) * 100) : 0;
    document.getElementById('stat-percent').innerText = percent;
}

function nextQ() { if (currentIdx < master.length - 1) showQuestion(currentIdx + 1); }
function prevQ() { if (currentIdx > 0) showQuestion(currentIdx - 0); }
function goTo(idx) { showQuestion(idx); }

function toggleFlag() {
    flags[currentIdx] = !flags[currentIdx];
    document.getElementById(`nav-${currentIdx}`).classList.toggle('flagged', flags[currentIdx]);
    updateFlagBtn();
}

function updateFlagBtn() {
    const btn = document.getElementById('btn-flag');
    btn.innerText = flags[currentIdx] ? "Zrušit příznak" : "Oznakovat otázku";
    btn.style.color = flags[currentIdx] ? "var(--primary)" : "inherit";
}

function resetTest() {
    if(confirm("Opravdu chcete restartovat celý test?")) location.reload();
}

window.onload = init;
</script>

</body>
</html>
